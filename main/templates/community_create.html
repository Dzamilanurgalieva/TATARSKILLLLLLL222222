{% extends 'base.html' %}
{% load static %}

{% block title %}Создать сообщество{% endblock %}

{% block content %}
<div class="container-custom py-5" style="margin-top: 100px;">
    <div class="card-glass p-5">
        <h1 class="section-title">Создать новое сообщество</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary-custom">Создать</button>
            <a href="{% url 'community_list' %}" class="btn-outline-custom">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
